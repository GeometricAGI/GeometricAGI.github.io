<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
  <meta name="author" content="{{ page.author.name | default: site.author.name }}">

  <link rel="canonical" href="{{ site.url }}{{ page.url }}">

  <!-- Open Graph -->
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:title" content="{{ page.title | default: site.title | escape }}">
  <meta property="og:description" content="{{ page.description | default: site.description | strip_html | strip_newlines | truncate: 160 | escape }}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:image" content="{{ site.url }}/assets/geometric_logo.jpeg">
  {% if page.layout == 'post' %}
  <meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
  <meta property="article:author" content="{{ page.author.linkedin | default: site.author.linkedin }}">
  {% endif %}

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ page.title | default: site.title | escape }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description | strip_html | strip_newlines | truncate: 160 | escape }}">
  <meta name="twitter:image" content="{{ site.url }}/assets/geometric_logo.jpeg">

  <!-- JSON-LD -->
  {% if page.layout == 'post' %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": {{ page.title | jsonify }},
    "description": {{ page.description | default: site.description | jsonify }},
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "dateModified": "{{ page.date | date_to_xmlschema }}",
    "url": "{{ site.url }}{{ page.url }}",
    "author": {
      "@type": "Person",
      "name": {{ page.author.name | default: site.author.name | jsonify }},
      "url": "{{ page.author.linkedin | default: site.author.linkedin }}"
    },
    "publisher": {
      "@type": "Organization",
      "name": {{ site.title | jsonify }},
      "url": "{{ site.url }}",
      "logo": { "@type": "ImageObject", "url": "{{ site.url }}/assets/geometric_logo.jpeg" }
    },
    "mainEntityOfPage": { "@type": "WebPage", "@id": "{{ site.url }}{{ page.url }}" }
  }
  </script>
  {% else %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": {{ site.title | jsonify }},
    "description": {{ site.description | jsonify }},
    "url": "{{ site.url }}"
  }
  </script>
  {% endif %}

  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <style>
    .markdown-body {
      max-width: 800px;
      margin: 0 auto;
      padding: 16px;
    }
  </style>
</head>
<body class="markdown-body">
  <header>
    <h1><a href="/" style="text-decoration: none; color: inherit;">Geometric <img src="/assets/geometric_logo_clear_background.png" alt="" width="40" style="vertical-align: middle; margin-left: 8px;"></a></h1>
  </header>
  {{ content }}
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/diff.min.js"></script>
  <script>
    // Rename language-* classes to hljs-compatible format
    document.querySelectorAll('code[class*="language-"]').forEach(function(el) {
      el.className.split(' ').forEach(function(cls) {
        if (cls.startsWith('language-')) {
          el.classList.add(cls.replace('language-', ''));
        }
      });
    });
    hljs.highlightAll();
  </script>
</body>
</html>
