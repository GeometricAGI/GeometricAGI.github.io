<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.5;
      color: #24292e;
      max-width: 800px;
      margin: 0 auto;
      padding: 16px;
      word-wrap: break-word;
    }
    a { color: #0366d6; }
    h1, h2, h3 { margin-top: 24px; margin-bottom: 16px; }
    hr { border: none; border-top: 1px solid #e1e4e8; margin: 24px 0; }

</head>
<body>
  <header>
    <h1><a href="/" style="text-decoration: none; color: inherit;">Geometric <img src="/assets/geometric_logo_clear_background.png" alt="" width="40" style="vertical-align: middle; margin-left: 8px;"></a></h1>
  </header>
  {{ content }}
</body>
</html>
