<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <style>
    .markdown-body {
      max-width: 800px;
      margin: 0 auto;
      padding: 16px;
    }
  </style>
</head>
<body class="markdown-body">
  <header>
    <h1><a href="/" style="text-decoration: none; color: inherit;">Geometric <img src="/assets/geometric_logo_clear_background.png" alt="" width="40" style="vertical-align: middle; margin-left: 8px;"></a></h1>
  </header>
  {{ content }}
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/diff.min.js"></script>
  <script>
    // Rename language-* classes to hljs-compatible format
    document.querySelectorAll('code[class*="language-"]').forEach(function(el) {
      el.className.split(' ').forEach(function(cls) {
        if (cls.startsWith('language-')) {
          el.classList.add(cls.replace('language-', ''));
        }
      });
    });
    hljs.highlightAll();
  </script>
</body>
</html>
